name: GitOps Pipeline for Staging

on:
  push:
    branches:
      - main

jobs:
  deploy-to-staging:
    # This is the critical change.
    # It tells GitHub to send this job to your local runner.
    runs-on: self-hosted

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Deploy to Minikube using Local Kubectl
        run: |
          # This command will be executed by the runner on your machine.
          # It automatically uses the same kubeconfig your terminal uses.
          kubectl apply -f staging/nginx-deployment.yaml --namespace=staging