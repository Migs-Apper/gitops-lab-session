name: GitOps Pipeline for Staging

# This workflow runs on any push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy-to-staging:
    # Use the latest version of Ubuntu for our runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code so the runner can access it
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step 2: Deploy the manifest to the Kubernetes cluster
      # This action securely sets up kubectl and applies the configuration
      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v5
        with:
          # The manifest file to deploy
          manifests: |
            staging/nginx-deployment.yaml

          # The Kubernetes namespace to deploy to
          namespace: 'staging'

          # The secret containing your kubeconfig credentials
          kubeconfig: ${{ secrets.KUBECONFIG }}