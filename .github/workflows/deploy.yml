name: GitOps Pipeline for Staging

on:
  push:
    branches:
      - main

jobs:
  deploy-to-staging:
    runs-on: ubuntu-latest
    steps:
      # First, checkout the repository code
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # NEW STEP: This securely logs into your Kubernetes cluster
      # It uses your secret and prepares kubectl for the next step
      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      # CORRECTED STEP: This now runs *after* login is complete.
      # Notice the 'kubeconfig:' line has been removed because it's not needed.
      - name: Deploy to Kubernetes
        uses: azure/k8s-deploy@v5
        with:
          namespace: 'staging'
          manifests: |
            staging/nginx-deployment.yaml